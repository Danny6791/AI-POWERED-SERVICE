<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERVICECRAFT — Sign Up</title>
  <meta name="description" content="Create your SERVICECRAFT account and start ordering expert services." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" /><link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="public/css/icons.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div class="bg-decor" aria-hidden="true"><span class="blob blob--1"></span><span class="blob blob--2"></span><span class="blob blob--3"></span></div>
  <header class="nav">
    <div class="container nav__inner">
      <a href="index.html" class="brand">
        <svg class="icon icon--md" style="color:var(--brand-2)"><use href="public/icons/icons.svg#ic-flash"/></svg>
        <span class="brand__name">Service<span class="brand__accent">Craft</span></span>
      </a>
      <nav class="nav__links" id="navLinks" aria-label="Primary">
        <a href="index.html#services">Services</a>
        <a href="login.html" class="btn btn--ghost">Login</a>
      </nav>
      <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    </div>
  </header>
  <main class="auth-page">
    <div class="glass-card auth-box">
      <h1>Create account ✨</h1>
      <p>Join 12,000+ creators on SERVICECRAFT</p>
      <form id="signupForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Alex Johnson" required /></div>
        <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com" required /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="At least 6 characters" required /></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="signupConfirm" placeholder="Repeat your password" required /></div>
        <button type="submit" class="btn btn--primary w-full" style="margin-top:4px">Create Account →</button>
        <div id="signupMsg" class="form-msg"></div>
      </form>
      <div class="auth-foot">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </main>
  <script src="js/db.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script>
</body>
</html>
