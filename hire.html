<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERVICECRAFT - Hire Professional</title>
  <meta name="description" content="Hire a professional on SERVICECRAFT." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="public/css/icons.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9889;</text></svg>" />
</head>
<body>
  <div class="bg-decor" aria-hidden="true"><span class="blob blob--1"></span><span class="blob blob--2"></span><span class="blob blob--3"></span></div>
  <header class="nav"><div class="container nav__inner">
    <a href="index.html" class="brand"><svg class="icon icon--md" style="color:var(--brand-2)"><use href="public/icons/icons.svg#ic-flash"/></svg><span class="brand__name">Service<span class="brand__accent">Craft</span></span></a>
    <nav class="nav__links" id="navLinks" aria-label="Primary">
      <a href="index.html">Home</a><a href="professionals.html">Professionals</a>
    </nav>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
  </div></header>
  <main style="padding:100px 0 60px"><div class="container">
    <!-- Pro Profile Card -->
    <div id="proProfile" class="glass-card" style="padding:28px;margin-bottom:28px;display:none">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(124,92,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg class="icon icon--xl" style="color:var(--brand)"><use href="public/icons/icons.svg#ic-account"/></svg>
        </div>
        <div style="flex:1;min-width:200px">
          <h2 id="proName" style="margin:0;font-size:1.3rem"></h2>
          <p id="proTitle" style="color:var(--muted);margin:4px 0 8px"></p>
          <div id="proStars" style="display:flex;align-items:center;gap:4px"></div>
        </div>
      </div>
      <div id="proSkills" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:16px"></div>
      <p id="proBio" style="color:var(--muted);margin-top:12px;font-size:.9rem"></p>
      <div style="display:flex;gap:20px;margin-top:12px;font-size:.88rem;color:var(--muted)">
        <span id="proRate"></span><span id="proExp"></span>
      </div>
    </div>
    <!-- Loading -->
    <div id="hireLoading" class="empty-state"><p style="color:var(--brand-2)">Loading professional profile...</p></div>
    <!-- Hire Form -->
    <div id="hireFormWrap" class="glass-card" style="padding:28px;max-width:600px;display:none">
      <h2 style="margin-bottom:4px"><svg class="icon icon--brand2"><use href="public/icons/icons.svg#ic-flash"/></svg> Send Hire Request</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:20px">Describe your project and budget</p>
      <div class="form-group"><label>Message</label><textarea id="hireMsg" placeholder="Tell the professional about your project..." rows="5" required></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group"><label>Budget (USD)</label><input type="number" id="hireBudget" placeholder="e.g. 500" min="1" required /></div>
        <div class="form-group"><label>Deadline</label><input type="date" id="hireDeadline" required /></div>
      </div>
      <button class="btn btn--primary w-full" id="hireBtn" style="margin-top:8px">
        <svg class="icon icon--sm"><use href="public/icons/icons.svg#ic-flash"/></svg> Send Request
      </button>
      <div id="hireMsg2" class="form-msg"></div>
    </div>
    <!-- Not Found -->
    <div id="proNotFound" class="empty-state" style="display:none">
      <div class="empty-state__icon"><svg class="icon icon--xl icon--muted"><use href="public/icons/icons.svg#ic-users"/></svg></div>
      <p>Professional not found. <a href="professionals.html" style="color:var(--brand-2);font-weight:600">Browse all professionals</a></p>
    </div>
  </div></main>
  <footer class="footer"><div class="container footer__inner">
    <div class="brand"><svg class="icon icon--md" style="color:var(--brand-2)"><use href="public/icons/icons.svg#ic-flash"/></svg><span class="brand__name">Service<span class="brand__accent">Craft</span></span></div>
    <p>&copy; <span id="year"></span> SERVICECRAFT. A demo marketplace.</p>
    <div class="footer__links"><a href="index.html#services">Services</a><a href="index.html#how">How it works</a></div>
  </div></footer>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/sc.js"></script>
  <script src="js/app.js"></script>
  <script>
  (function(){
    "use strict";
    var params=new URLSearchParams(window.location.search);
    var proId=params.get('id');
    var load=document.getElementById('hireLoading'),profile=document.getElementById('proProfile'),form=document.getElementById('hireFormWrap'),nf=document.getElementById('proNotFound');
    function stars(n){var s='';for(var i=0;i<5;i++)s+='<svg class="icon icon--sm" style="color:'+(i<Math.round(n)?'#ffc107':'var(--muted)')+';opacity:.8"><use href="public/icons/icons.svg#ic-star"/></svg>';return s;}
    async function init(){
      if(!proId){load.style.display='none';nf.style.display='block';return;}
      try{var p=await SC.getPro(proId);
        if(!p){load.style.display='none';nf.style.display='block';return;}
        load.style.display='none';profile.style.display='block';form.style.display='block';
        document.getElementById('proName').textContent=p.full_name||'Professional';
        document.getElementById('proTitle').textContent=p.professional_title||'Expert';
        document.getElementById('proStars').innerHTML=stars(p.rating||0)+'<span style="color:var(--muted);font-size:.85rem">('+(p.rating||0)+')</span>';
        document.getElementById('proSkills').innerHTML=(p.skills||[]).map(function(s){return '<span class="badge badge--progress">'+s+'</span>'}).join('');
        document.getElementById('proBio').textContent=p.bio||'';
        document.getElementById('proRate').innerHTML=p.hourly_rate?'$'+p.hourly_rate+'/hr':'';
        document.getElementById('proExp').innerHTML=p.years_experience?p.years_experience+' years experience':'';
      }catch(e){load.style.display='none';nf.style.display='block';}
    }
    document.getElementById('hireBtn').addEventListener('click',async function(){
      var msg=document.getElementById('hireMsg2');
      var message=document.getElementById('hireMsg').value.trim();
      var budget=document.getElementById('hireBudget').value;
      var deadline=document.getElementById('hireDeadline').value;
      if(!SC.isLoggedIn()){msg.textContent='Please log in to hire';msg.className='form-msg error';return;}
      if(!message){msg.textContent='Please describe your project';msg.className='form-msg error';return;}
      if(!budget){msg.textContent='Please set a budget';msg.className='form-msg error';return;}
      this.disabled=true;this.textContent='Sending...';msg.className='form-msg';
      try{var r=await SC.hirePro(proId,message,parseFloat(budget),deadline);
        if(r.ok){msg.className='form-msg success';msg.textContent='Hire request sent! The professional will review your request.';document.getElementById('hireMsg').value='';document.getElementById('hireBudget').value='';document.getElementById('hireDeadline').value='';}
        else{msg.textContent=r.msg||'Failed';msg.className='form-msg error';}}
      catch(e){msg.textContent='Network error';msg.className='form-msg error';}
      this.disabled=false;this.textContent='Send Request';
    });
    init();
  })();
  </script>
</body>
</html>
